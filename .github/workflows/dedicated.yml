name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2025
            build_script: devtools\bin\vpc.exe /tf /define:SOURCESDK +dedicated /dedicated /mksln dedicated.sln
            build_cmd: msbuild dedicated.sln /p:Configuration=Release /p:Platform=win64 /m
            artifact_name: rush-dedicated-windows
          - os: ubuntu-latest
            vpc_linux: ./devtools/bin/vpc /tf /define:SOURCESDK +dedicated /dedicated /mksln dedicated.sln
            build_script: ./buildallprojects
            build_cmd: ""
            artifact_name: rush-dedicated-linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y g++-multilib ninja-build lib32z1-dev podman

      - name: Setup MSBuild (Windows only)
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Generate & Fix Dedicated (Windows)
        if: runner.os == 'Windows'
        working-directory: src
        shell: powershell
        run: |
          & ${{ matrix.build_script }}
          $path = ".\game\server\server_win64_srv_tf.vcxproj"
          $xml = [xml](Get-Content $path)
          $updated = $false
          foreach ($group in $xml.Project.ItemDefinitionGroup) {
              $pre = $group.ClCompile.PreprocessorDefinitions
              if ($pre -notmatch "DEDICATED;") {
                  $group.ClCompile.PreprocessorDefinitions = "DEDICATED;$($pre)"
                  $updated = $true
              }
          }
          if ($updated) { $xml.Save($path) }

      - name: Generate Dedicated Projects (Linux)
        if: runner.os == 'Linux'
        working-directory: src
        shell: bash
        run: |
          chmod +x devtools/bin/vpc
          ${{ matrix.vpc_linux }}

      - name: Create ccache folder
        run: mkdir -p /home/runner/.ccache
        shell: bash
        if: runner.os == 'Linux'

      - name: Build (Linux)
        run: ${{ matrix.build_script }}
        working-directory: src
        shell: bash
        if: runner.os == 'Linux'

      - name: Build (Windows only)
        if: runner.os == 'Windows'
        working-directory: src
        run: ${{ matrix.build_cmd }}

      - name: Isolate Server Binaries
        shell: bash
        run: |
          mkdir -p dedicated_bins
          if [ "${{ runner.os }}" = "Windows" ]; then
            find game/ -name "server.dll" -exec cp {} dedicated_bins/ \;
          else
            find game/ -name "server_srv.so" -exec cp {} dedicated_bins/ \;
            find game/ -name "tf_goldrush_dev_linux64" -exec cp {} dedicated_bins/ \; 2>/dev/null || true
          fi

      - name: Clean and strip (Linux)
        if: runner.os == 'Linux'
        run: |
          find game/tf_goldrush_dev/bin/linux64 -type f -executable -exec strip --strip-all {} +
          if [ -f game/tf_goldrush_dev_linux64 ]; then
            strip --strip-all game/tf_goldrush_dev_linux64
          fi
        shell: bash

      - name: Clean up Windows build
        if: runner.os == 'Windows'
        run: |
            for /r "game" %%f in (*.pdb) do del /q "%%f"
        shell: cmd

      - name: Upload Game Folder
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: game/

      - name: Upload Dedicated Binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-bins
          path: dedicated_bins/
